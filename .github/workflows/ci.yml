name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Check syntax (all JS files)
        run: |
          for f in $(find src tests -name '*.js'); do node --check "$f"; done
          echo "All files pass syntax check"

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm run test:ci

  detection-mock:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Mock detection test
        run: node tests/detect.js --mock

  integration:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Download cykani-browser binary
        run: |
          curl -sL $(curl -s https://api.github.com/repos/kaunda-a/cykani-browser/releases/latest | grep "browser_download_url" | head -1 | cut -d'"' -f4) -o /tmp/chrome
          chmod +x /tmp/chrome
      - name: Integration tests
        run: xvfb-run -a npm run test:integration
        env:
          CYKANI_BINARY_PATH: /tmp/chrome
