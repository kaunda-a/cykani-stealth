name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  test-stealth:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Download pre-built binary from latest cykani-browser release
      - name: Download cykani-browser binary
        run: |
          curl -sL $(curl -s https://api.github.com/repos/kaunda-a/cykani-browser/releases/latest | grep "browser_download_url" | head -1 | cut -d'"' -f4) -o chrome
          chmod +x chrome

      - name: Install dependencies
        run: npm ci

      - name: Run sannysoft stealth check
        run: xvfb-run -a node tests/test_sannysoft.js
        env:
          CYKANI_BINARY_PATH: ./chrome

      - name: Run incolumitas bot check
        run: xvfb-run -a node tests/test_incolumitas.js
        env:
          CYKANI_BINARY_PATH: ./chrome
