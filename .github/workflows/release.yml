name: Create binary release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. cykani-browser-v1.0.0)'
        required: true
        default: 'cykani-browser-v1.0.0'
      changelog:
        description: 'Changelog notes'
        required: false
        default: 'cykani-browser binary release'

  push:
    tags: ['cykani-browser-v*']

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: cykani-browser ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            cykani-browser binary release.
            Install with: `npm install cykani-stealth`
            
            ${{ github.event.inputs.changelog }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Upload binary artifact (run after uploading binary manually)
